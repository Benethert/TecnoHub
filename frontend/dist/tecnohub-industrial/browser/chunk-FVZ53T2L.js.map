<div class="dashboard">

  <!-- Header de bienvenida -->
  <div class="dash-header">
    <div class="dash-header-text">
      <h1 class="dash-title">{{ greeting }}, Operario</h1>
      <p class="dash-subtitle">Panel de control — TecnoHub</p>
    </div>
    <div class="dash-date">
      <span class="date-label">Hoy</span>
      <span class="date-value">{{ todayLabel }}</span>
    </div>
  </div>

  <!-- KPI Cards -->
  <div class="kpi-grid">
    <div
      class="kpi-card"
      *ngFor="let kpi of kpis"
      (click)="navigate(kpi.route)"
    >
      <div class="kpi-icon-wrap" [style.background-color]="kpi.color + '1A'">
        <!-- Ticket icon -->
        <svg *ngIf="kpi.icon === 'ticket'" width="22" height="22" viewBox="0 0 24 24" fill="none"
             [style.color]="kpi.color" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M15 5v2M15 11v2M15 17v2M5 5h14a2 2 0 0 1 2 2v3a2 2 0 0 0 0 4v3a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-3a2 2 0 0 0 0-4V7a2 2 0 0 1 2-2z"/>
        </svg>
        <!-- Cart icon -->
        <svg *ngIf="kpi.icon === 'cart'" width="22" height="22" viewBox="0 0 24 24" fill="none"
             [style.color]="kpi.color" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        <!-- Machine icon -->
        <svg *ngIf="kpi.icon === 'machine'" width="22" height="22" viewBox="0 0 24 24" fill="none"
             [style.color]="kpi.color" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <rect x="2" y="7" width="20" height="14" rx="2"/>
          <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2M12 12v3M8 12h8"/>
        </svg>
        <!-- SCADA icon -->
        <svg *ngIf="kpi.icon === 'scada'" width="22" height="22" viewBox="0 0 24 24" fill="none"
             [style.color]="kpi.color" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
      </div>
      <div class="kpi-body">
        <span class="kpi-value">{{ kpi.value }}</span>
        <span class="kpi-label">{{ kpi.label }}</span>
        <span class="kpi-sub">{{ kpi.sub }}</span>
      </div>
      <div class="kpi-arrow">›</div>
    </div>
  </div>

  <!-- Acciones rápidas -->
  <section class="section">
    <h2 class="section-title">Acciones Rápidas</h2>
    <div class="actions-grid">
      <button
        class="action-card"
        *ngFor="let a of quickActions"
        (click)="navigate(a.route)"
      >
        <div class="action-icon">
          <!-- Plus-ticket -->
          <svg *ngIf="a.icon === 'plus-ticket'" width="24" height="24" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M15 5v2M15 11v2M15 17v2M5 5h14a2 2 0 0 1 2 2v3a2 2 0 0 0 0 4v3a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-3a2 2 0 0 0 0-4V7a2 2 0 0 1 2-2z"/>
            <line x1="10" y1="12" x2="14" y2="12"/><line x1="12" y1="10" x2="12" y2="14"/>
          </svg>
          <!-- Cart -->
          <svg *ngIf="a.icon === 'cart'" width="24" height="24" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
          </svg>
          <!-- SCADA -->
          <svg *ngIf="a.icon === 'scada'" width="24" height="24" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
          <!-- Log -->
          <svg *ngIf="a.icon === 'log'" width="24" height="24" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10 9 9 9 8 9"/>
          </svg>
        </div>
        <div class="action-text">
          <span class="action-label">{{ a.label }}</span>
          <span class="action-desc">{{ a.description }}</span>
        </div>
        <span class="action-arrow">›</span>
      </button>
    </div>
  </section>

  <!-- Nota de estado del sistema -->
  <div class="system-status">
    <div class="status-dot status-dot--ok"></div>
    <span class="status-text">Todos los sistemas operativos · TecnoHub v1.0</span>
  </div>

</div>
